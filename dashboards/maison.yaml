# Dashboard "Maison" - configuration Lovelace
# Reference versionnee. Le dashboard live est dans HA (.storage, mode UI) ;
# il est applique a chaud via WebSocket lovelace/config/save (url_path lovelace-home).
#
# Thermostats Overkiz : cartes template (pas de controle direct = pas de
# commande lente au serveur Atlantic). Elles affichent temperature + indicateur
# marche/arret (couleur + pastille) + la bonne consigne selon chaud/froid ;
# les controles s'ouvrent dans la popup (more-info) au clic.

title: Maison
views:
  # ---------------------------------------------------------------- PISCINE
  - title: Piscine
    path: piscine
    icon: mdi:pool
    badges: []
    cards:
      - type: custom:apexcharts-card
        apex_config:
          chart:
            height: 200px
        graph_span: 72h
        all_series_config:
          stroke_width: 3
        header:
          show: true
          show_states: true
          colorize_states: true
        series:
          - entity: sensor.temp_exterieur_temperature
            name: Extérieur
            color: yellow
          - entity: sensor.temperature_piscine_2
            name: Piscine
        yaxis:
          - min: "|-1|"
            max: "|+1|"
            show: false

  # ------------------------------------------------------------------- HOME
  - title: Home
    path: default_view
    icon: mdi:home
    cards:
      # Bandeau d'apercu rapide
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: entity
            entity: sensor.time
            icon: mdi:clock-outline
          - type: entity
            entity: sensor.temp_exterieur_temperature
            icon: mdi:thermometer
          - type: entity
            entity: sensor.rte_tempo_couleur_actuelle_visuel
            icon: mdi:flash
          - type: entity
            entity: sensor.conso_maison_hors_tesla
            icon: mdi:home-lightning-bolt

      # ===================================================== SALON & SEJOUR
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Salon & séjour
            subtitle: ""
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: climate.zone_control_salon
                primary: Salon
                secondary: >-
                  {% set t = state_attr(entity,'current_temperature') %}
                  {% set a = state_attr(entity,'hvac_action') %}
                  {% set lo = state_attr(entity,'target_temp_low') %}
                  {% set hi = state_attr(entity,'target_temp_high') %}
                  {{ t }}°{% if is_state(entity,'off') %} · Éteint{% elif a == 'heating' %} · chauffe → {{ lo }}°{% elif a == 'cooling' %} · refroidit → {{ hi }}°{% else %} · {{ lo }}–{{ hi }}°{% endif %}
                icon: mdi:thermostat
                icon_color: >-
                  {% set a = state_attr(entity,'hvac_action') %}
                  {% if is_state(entity,'off') %}grey{% elif a == 'heating' %}orange{% elif a == 'cooling' %}blue{% else %}green{% endif %}
                badge_icon: mdi:power
                badge_color: "{{ 'disabled' if is_state(entity,'off') else 'green' }}"
                tap_action:
                  action: more-info
              - type: custom:mushroom-template-card
                entity: climate.zone_control
                primary: Général
                secondary: >-
                  {% set m = states(entity) %}
                  {{ {'off':'Éteint','cool':'Climatisation','heat':'Chauffage','dry':'Déshumidification','auto':'Auto'}.get(m, m) }}
                icon: mdi:home-thermometer
                icon_color: >-
                  {% if is_state(entity,'off') %}grey{% elif is_state(entity,'cool') %}blue{% elif is_state(entity,'heat') %}orange{% else %}green{% endif %}
                badge_icon: mdi:power
                badge_color: "{{ 'disabled' if is_state(entity,'off') else 'green' }}"
                tap_action:
                  action: more-info
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-light-card
                entity: light.innr_rb_287_c
                name: Salon
                show_brightness_control: true
                collapsible_controls: true
              - type: custom:mushroom-light-card
                entity: light.innr_rb_287_c_2
                name: Salle à manger
                show_brightness_control: true
                collapsible_controls: true
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-cover-card
                entity: cover.interrupteur_volet_cuisine_volets
                name: Cuisine
                show_buttons_control: true
                hide_state: true
              - type: custom:mushroom-cover-card
                entity: cover.interrupteur_volet_baie_vitree_volets
                name: Baie vitrée
                show_buttons_control: true
                hide_state: true

      # ============================================================= CHAMBRE
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Chambre
            subtitle: ""
          - type: custom:mushroom-template-card
            entity: climate.zone_control_chambre
            primary: Chambre
            secondary: >-
              {% set t = state_attr(entity,'current_temperature') %}
              {% set a = state_attr(entity,'hvac_action') %}
              {% set lo = state_attr(entity,'target_temp_low') %}
              {% set hi = state_attr(entity,'target_temp_high') %}
              {{ t }}°{% if is_state(entity,'off') %} · Éteint{% elif a == 'heating' %} · chauffe → {{ lo }}°{% elif a == 'cooling' %} · refroidit → {{ hi }}°{% else %} · {{ lo }}–{{ hi }}°{% endif %}
            icon: mdi:thermostat
            icon_color: >-
              {% set a = state_attr(entity,'hvac_action') %}
              {% if is_state(entity,'off') %}grey{% elif a == 'heating' %}orange{% elif a == 'cooling' %}blue{% else %}green{% endif %}
            badge_icon: mdi:power
            badge_color: "{{ 'disabled' if is_state(entity,'off') else 'green' }}"
            tap_action:
              action: more-info
          - type: custom:mushroom-cover-card
            entity: cover.interrupteur_volet_chambre_volets
            name: Chambre
            show_buttons_control: true
            hide_state: true

      # ======================================================== CHAMBRE NONO
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Chambre Nono
            subtitle: ""
          - type: custom:mushroom-template-card
            entity: climate.zone_control_chambre_nono
            primary: Chambre Nono
            secondary: >-
              {% set t = state_attr(entity,'current_temperature') %}
              {% set a = state_attr(entity,'hvac_action') %}
              {% set lo = state_attr(entity,'target_temp_low') %}
              {% set hi = state_attr(entity,'target_temp_high') %}
              {{ t }}°{% if is_state(entity,'off') %} · Éteint{% elif a == 'heating' %} · chauffe → {{ lo }}°{% elif a == 'cooling' %} · refroidit → {{ hi }}°{% else %} · {{ lo }}–{{ hi }}°{% endif %}
            icon: mdi:thermostat
            icon_color: >-
              {% set a = state_attr(entity,'hvac_action') %}
              {% if is_state(entity,'off') %}grey{% elif a == 'heating' %}orange{% elif a == 'cooling' %}blue{% else %}green{% endif %}
            badge_icon: mdi:power
            badge_color: "{{ 'disabled' if is_state(entity,'off') else 'green' }}"
            tap_action:
              action: more-info
          - type: custom:mushroom-cover-card
            entity: cover.interrupteur_volet_chambre_nono_volets
            name: Chambre Nono
            show_buttons_control: true
            hide_state: true

      # ============================================================== BUREAU
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Bureau
            subtitle: ""
          - type: custom:mushroom-template-card
            entity: climate.zone_control_bureau
            primary: Bureau
            secondary: >-
              {% set t = state_attr(entity,'current_temperature') %}
              {% set a = state_attr(entity,'hvac_action') %}
              {% set lo = state_attr(entity,'target_temp_low') %}
              {% set hi = state_attr(entity,'target_temp_high') %}
              {{ t }}°{% if is_state(entity,'off') %} · Éteint{% elif a == 'heating' %} · chauffe → {{ lo }}°{% elif a == 'cooling' %} · refroidit → {{ hi }}°{% else %} · {{ lo }}–{{ hi }}°{% endif %}
            icon: mdi:thermostat
            icon_color: >-
              {% set a = state_attr(entity,'hvac_action') %}
              {% if is_state(entity,'off') %}grey{% elif a == 'heating' %}orange{% elif a == 'cooling' %}blue{% else %}green{% endif %}
            badge_icon: mdi:power
            badge_color: "{{ 'disabled' if is_state(entity,'off') else 'green' }}"
            tap_action:
              action: more-info
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-cover-card
                entity: cover.interrupteur_volet_bureau_volets
                name: Bureau
                show_buttons_control: true
                hide_state: true
              - type: custom:mushroom-entity-card
                entity: light.ampoule_entree_light
                name: Entrée

      # ============================================================= PISCINE
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Piscine
            subtitle: ""
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.temperature_piscine_2
                name: Température
                icon: mdi:pool-thermometer
              - type: custom:mushroom-entity-card
                entity: sensor.temp_exterieur_temperature
                name: Extérieur
                icon: mdi:thermometer
              - type: custom:mushroom-entity-card
                entity: switch.relais_pompe_piscine
                name: Pompe
                icon: mdi:water-pump
                tap_action:
                  action: more-info
              - type: custom:mushroom-entity-card
                entity: switch.sonoff_spot_piscine_switch
                name: Spot
                icon: mdi:lightbulb
                tap_action:
                  action: more-info

      # ============================================================= ENERGIE
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Énergie
            subtitle: ""
          - type: custom:mushroom-entity-card
            entity: sensor.conso_maison_hors_tesla
            name: Conso maison
            icon: mdi:home-lightning-bolt

  # ----------------------------------------------------------------- SYSTEM
  - title: System
    path: system
    icon: mdi:desktop-classic
    badges: []
    cards:
      - type: entities
        entities:
          - entity: sensor.system_monitor_last_boot
          - entity: sensor.system_monitor_load_1m
          - entity: sensor.system_monitor_load_5m
          - entity: sensor.system_monitor_load_15m
          - entity: sensor.system_monitor_processor_temperature
          - entity: sensor.system_monitor_processor_use
          - entity: sensor.system_monitor_disk_free
          - entity: sensor.system_monitor_memory_use
          - entity: sensor.system_monitor_memory_use_percent
          - entity: sensor.system_monitor_swap_use_percent
          - entity: sensor.system_monitor_swap_use
          - entity: sensor.system_monitor_swap_free
