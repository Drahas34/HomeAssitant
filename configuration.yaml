# Loads default set of integrations. Do not remove.
default_config:
frontend:
  themes: !include_dir_merge_named themes

# Text to speech
tts:
  - platform: google_translate

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
sensor:
  - platform: time_date
    display_options:
      - "time"

telegram_bot:
  - platform: polling
    api_key: !secret telegram_token
    allowed_chat_ids:
      - !secret id_telegram_xxxxx

notify:
  - platform: telegram
    name: Telegram
    chat_id: !secret id_telegram_xxxxx

logger:
  default: critical

http:
  ip_ban_enabled: true
  login_attempts_threshold: 5
  # ssl_certificate: /ssl/fullchain.pem
  # ssl_key: /ssl/privkey.pem
  # use_x_forwarded_for: true
  # trusted_proxies:
  #   - 172.30.33.0/24

emulated_hue:
  type: alexa
  host_ip: 192.168.1.35
  listen_port: 80
  expose_by_default: false
  off_maps_to_on_domains:
    - script
  entities:
    script.ouvre_les_volets:
      name: "Ouvre les volets"
      hidden: false
    script.fermer_les_volets:
      name: "Ferme les volets"
      hidden: false
    sensor.temperature_piscine_2:
      name: "Temperature piscine"
      hidden: false

mqtt:
  sensor:
    - name: "Solaire - Production journalière"
      state_topic: "winet/inverter/day_yield"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      unique_id: "sungrow_daily_yield"

    - name: "Solaire - Puissance instantanée"
      state_topic: "winet/inverter/total_active_power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      unique_id: "sungrow_active_power"

template:
  - sensor:
      - name: "Lixee Total Import"
        unique_id: lixee_total_import
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.lixee_zlinky_tic_consommation')|float +
            states('sensor.lixee_zlinky_tic_consommation_partie_3')|float +
            states('sensor.lixee_zlinky_tic_consommation_partie_4')|float +
            states('sensor.lixee_zlinky_tic_consommation_partie_5')|float +
            states('sensor.lixee_zlinky_tic_consommation_heures_creuses')|float +
            states('sensor.lixee_zlinky_tic_consommation_heures_pleines')|float
          }}

      - name: "Zendure Total charges"
        unique_id: zendure_total_charges
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.solarflow_800_plus_1_total_charges')|float(0)
            + states('sensor.solarflow_800_plus_2_total_charges')|float(0)
            + states('sensor.solarflow_800_plus_3_total_charges')|float(0)
            + states('sensor.solarflow_2400_ac_aggr_charge')|float(0)
          }}

      - name: "Zendure Total décharges"
        unique_id: zendure_total_decharges
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.solarflow_800_plus_1_total_decharges')|float(0)
            + states('sensor.solarflow_800_plus_2_total_decharges')|float(0)
            + states('sensor.solarflow_800_plus_3_total_decharges')|float(0)
            + states('sensor.solarflow_2400_ac_aggr_discharge')|float(0)
          }}

      - name: "Zendure Puissance charge totale"
        unique_id: zendure_puissance_charge_totale
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{
            states('sensor.solarflow_800_plus_1_pack_input_power')|float(0)
            + states('sensor.solarflow_800_plus_2_pack_input_power')|float(0)
            + states('sensor.solarflow_800_plus_3_pack_input_power')|float(0)
            + states('sensor.solarflow_2400_ac_pack_input_power')|float(0)
          }}

      - name: "Zendure Puissance décharge totale"
        unique_id: zendure_puissance_decharge_totale
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{
            states('sensor.solarflow_800_plus_1_output_pack_power')|float(0)
            + states('sensor.solarflow_800_plus_2_output_pack_power')|float(0)
            + states('sensor.solarflow_800_plus_3_output_pack_power')|float(0)
            + states('sensor.solarflow_2400_ac_output_pack_power')|float(0)
          }}

      - name: "Zendure SOC Global"
        unique_id: zendure_soc_global
        unit_of_measurement: "%"
        icon: mdi:battery
        state: >
          {% set c1 = states('sensor.solarflow_800_plus_1_total_kwh')|float(0) %}
          {% set c2 = states('sensor.solarflow_800_plus_2_total_kwh')|float(0) %}
          {% set c3 = states('sensor.solarflow_800_plus_3_total_kwh')|float(0) %}
          {% set c4 = states('sensor.solarflow_2400_ac_total_kwh')|float(0) %}

          {% set s1 = states('sensor.solarflow_800_plus_1_electric_level')|float(0) %}
          {% set s2 = states('sensor.solarflow_800_plus_2_electric_level')|float(0) %}
          {% set s3 = states('sensor.solarflow_800_plus_3_electric_level')|float(0) %}
          {% set s4 = states('sensor.solarflow_2400_ac_electric_level')|float(0) %}

          {% set total = c1 + c2 + c3 + c4 %}

          {% if total > 0 %}
            {{ ((s1*c1 + s2*c2 + s3*c3 + s4*c4) / total) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure Puissance nette"
        unique_id: zendure_puissance_nette
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{
            states('sensor.zendure_puissance_decharge_totale')|float(0)
            - states('sensor.zendure_puissance_charge_totale')|float(0)
          }}

      - name: "Conso maison hors Tesla"
        unique_id: conso_maison_hors_tesla
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set solaire_kw = states('sensor.sg60rs_a2282233023_total_active_power')|float(0) %}
          {% set solaire_w = solaire_kw * 1000 %}

          {% set reseau_w = states('sensor.shellypro3em_ac15187c66d4_puissance')|float(0) %}
          {% set batterie_w = states('sensor.zendure_puissance_nette')|float(0) %}
          {% set tesla_w = states('sensor.borne_recharge_puissance_de_charge')|float(0) %}

          {% set maison_totale = solaire_w + reseau_w + batterie_w %}
          {{ [maison_totale - tesla_w, 0] | max | round(0) }}

